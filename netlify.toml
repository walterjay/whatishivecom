
# This configuration tells Netlify where to find your serverless functions
# and sets up a clean URL for your API.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# This redirect makes your function accessible at /api/ask-ai instead of
# the longer /.netlify/functions/ask-ai URL.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
